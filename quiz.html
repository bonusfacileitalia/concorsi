    <style>

        header { background-color: var(--primary-blue); color: white; padding: 1.5rem 1rem; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { font-size: 1.8rem; font-weight: 800; }
        .quiz-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; flex-grow: 1; width: 100%; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-weight: 600; }
        .timer { display: flex; align-items: center; gap: 0.5rem; background: #E2E8F0; padding: 0.5rem 1rem; border-radius: 20px; font-variant-numeric: tabular-nums; }
        .progress-bar { width: 100%; height: 10px; background: #E2E8F0; border-radius: 5px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.5rem; line-height: 1.4; }
        .options-grid { display: grid; gap: 0.8rem; }
        .option-btn { background: var(--bg-light); border: 2px solid #E2E8F0; padding: 0.8rem 1rem; border-radius: 8px; font-size: 1rem; text-align: left; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary-blue); background: #E2E8F0; }
        .option-btn.correct { background-color: #D1FAE5; border-color: var(--success); color: #065F46; }
        .option-btn.wrong { background-color: #FEE2E2; border-color: var(--error); color: #991B1B; }
        .feedback-box { margin-top: 1.2rem; padding: 1.2rem; border-radius: 8px; display: none; }
        .feedback-box.show { display: block; animation: slideDown 0.3s ease; }
        .btn-primary { background: var(--action-red); color: white; border: none; padding: 1rem; font-size: 1.2rem; font-weight: 800; border-radius: 8px; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; margin-top: 1.5rem; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; margin: 0 auto 1.5rem; }
        .sales-pitch { background: #FFF4F2; border: 2px solid var(--action-red); padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; text-align: left; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>

        let quizSessione = [];

        const progressFill = document.getElementById('progress-fill');
        const questionCounter = document.getElementById('question-counter');
        const timeDisplay = document.getElementById('time-display');

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            quizSessione = shuffle([...databaseQuiz]).slice(0, 13);
            score = 0; currentQuestionIndex = 0; secondsElapsed = 0;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const mins = String(Math.floor(secondsElapsed/60)).padStart(2,'0');
                const secs = String(secondsElapsed%60).padStart(2,'0');
                timeDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
            loadQuestion();
        }

        function loadQuestion() {
            nextBtn.style.display = 'none';
            feedbackBox.className = 'feedback-box';
            optionsGrid.innerHTML = '';
            const q = quizSessione[currentQuestionIndex];
            questionText.innerText = q.q;
            questionCounter.innerText = `Domanda ${currentQuestionIndex + 1}/13`;
            progressFill.style.width = `${(currentQuestionIndex/13)*100}%`;
            
            shuffle([...q.o]).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const all = optionsGrid.querySelectorAll('.option-btn');
                    all.forEach(b => {
                        b.disabled = true;
                        if(b.innerText === q.a) {
                            b.classList.add('correct'); 
                        }
                    });
                    
                    feedbackBox.style.padding = "1.2rem";
                    feedbackBox.style.borderRadius = "8px";
                    feedbackBox.style.marginTop = "1.2rem";
                    
                    if(opt === q.a) { 
                        score++; 
                        feedbackTitle.innerText="✅ ESATTO"; 
                        feedbackTitle.style.color = "#065F46";
                        feedbackBox.style.backgroundColor = '#D1FAE5'; 
                        feedbackBox.style.border = '2px solid #10B981';
                        feedbackText.innerHTML = "<strong>Riferimento normativo:</strong> " + q.e;
                    }
                    else { 
                        btn.classList.add('wrong'); 
                        feedbackTitle.innerText="❌ ERRORE GRAVE"; 
                        feedbackTitle.style.color = "#991B1B";
                        feedbackBox.style.backgroundColor = '#FEE2E2'; 
                        feedbackBox.style.border = '2px solid #EF4444';
                        feedbackText.innerHTML = "<strong style='color: #991B1B;'>La risposta corretta era:</strong> <span style='color: #065F46; font-weight: 800;'>" + q.a + "</span><br><br><strong style='color: #991B1B;'>Perché hai sbagliato:</strong> " + q.e + " <br><br><em style='color: #666; font-size: 0.85rem;'>⚠️ Hai risposto d'impulso cadendo in un classico trabocchetto. Al concorso un errore così banale ti costa l'idoneità.</em>";
                    }
                    
                    feedbackBox.classList.add('show');
                    nextBtn.style.display = 'block';
                };
                optionsGrid.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if(currentQuestionIndex < 13) loadQuestion();
            else {
                clearInterval(timerInterval);
                quizScreen.classList.add('hidden');
