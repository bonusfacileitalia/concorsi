<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Quiz | Diritto Amministrativo 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7345740458390832" crossorigin="anonymous"></script>
    <style>
        :root { --primary-blue: #0A2540; --action-red: #D93025; --bg-light: #F6F9FC; --text-dark: #333333; --success: #10B981; --error: #EF4444; --card-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary-blue); color: white; padding: 1.5rem 1rem; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { font-size: 1.8rem; font-weight: 800; }
        .quiz-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; flex-grow: 1; width: 100%; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-weight: 600; }
        .timer { display: flex; align-items: center; gap: 0.5rem; background: #E2E8F0; padding: 0.5rem 1rem; border-radius: 20px; font-variant-numeric: tabular-nums; }
        .progress-bar { width: 100%; height: 10px; background: #E2E8F0; border-radius: 5px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.5rem; line-height: 1.4; }
        .options-grid { display: grid; gap: 0.8rem; }
        .option-btn { background: var(--bg-light); border: 2px solid #E2E8F0; padding: 0.8rem 1rem; border-radius: 8px; font-size: 1rem; text-align: left; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary-blue); background: #E2E8F0; }
        .option-btn.correct { background-color: #D1FAE5; border-color: var(--success); color: #065F46; }
        .option-btn.wrong { background-color: #FEE2E2; border-color: var(--error); color: #991B1B; }
        .feedback-box { margin-top: 1.2rem; padding: 1.2rem; border-radius: 8px; display: none; }
        .feedback-box.show { display: block; animation: slideDown 0.3s ease; }
        .btn-primary { background: var(--action-red); color: white; border: none; padding: 1rem; font-size: 1.2rem; font-weight: 800; border-radius: 8px; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; margin-top: 1.5rem; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; margin: 0 auto 1.5rem; }
        .sales-pitch { background: #FFF4F2; border: 2px solid var(--action-red); padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; text-align: left; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header><h1>Simulatore Esame 2026</h1></header>
    <main class="quiz-container">
        <div id="start-screen" class="card" style="text-align: center;">
            <h2 style="margin-bottom: 1rem;">Test Diritto Amministrativo</h2>
            <p style="margin-bottom: 2rem; color: #666;">Database aggiornato: 100 domande. Il sistema ne estrarrà 13 casuali. Solo l'80% garantisce l'idoneità.</p>
            <button class="btn-primary" onclick="startQuiz()">INIZIA IL TEST ➔</button>
        </div>
        <div id="quiz-screen" class="card hidden">
            <div class="quiz-header"><span id="question-counter">Domanda 1/13</span><div class="timer">⏱️ <span id="time-display">00:00</span></div></div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <h2 id="question-text" class="question-text"></h2>
            <div id="options-grid" class="options-grid"></div>
            <div id="feedback-box" class="feedback-box">
                <h4 id="feedback-title"></h4>
                <p id="feedback-text" style="font-size: 0.9rem; margin-top: 0.5rem;"></p>
            </div>
            <button id="next-btn" class="btn-primary" style="display:none; background: var(--primary-blue);" onclick="nextQuestion()">CONTINUA ➔</button>
        </div>
        <div id="result-screen" class="card hidden" style="text-align: center;">
            <h2>Esito Finale</h2>
            <p style="margin: 1rem 0; color: #666;">Tempo: <span id="final-time"></span></p>
            <div class="score-circle" id="score-display">0%</div>
            <div id="sales-container"></div>
            <button class="btn-primary" style="background-color: var(--primary-blue); margin-top: 1rem;" onclick="location.reload()">🔄 RIPETI IL QUIZ</button>
        </div>
    </main>

    <script>

        "c": "Esclusivamente quando sussista il dolo specifico di favorire un determinato operatore economico o di arrecare danno ingiusto a terzi.",

    {

    {
        "q": "Una Direttiva UE 'non tempestivamente trasposta' può avere efficacia diretta verticale quando:",
        "a": "Impone obblighi specifici ai cittadini nei confronti della Pubblica Amministrazione nazionale entro i confini dello Stato membro.",
        "b": "Attribuisce ai singoli diritti chiari, precisi e incondizionate che possono essere fatti valere nei confronti dello Stato inadempiente.",

        "correct": "b"
    },
    {
        "q": "In caso di annullamento d'ufficio ex art. 21-nonies, il termine decadenziale di 12 mesi per i provvedimenti autorizzatori decorre:",
        "a": "Dalla data di adozione formale del provvedimento viziato da parte dell'unità organizzativa responsabile del procedimento.",

        "d": "Dalla data della notificazione del provvedimento ai soggetti controinteressati individuati ai sensi dell'art. 7 della L. 241/90.",
        "correct": "a"
    },
    {
        "q": "Nella struttura del PIAO, la sezione dedicata alla 'Performance' integra i contenuti precedentemente previsti nel:",
        "a": "Piano Triennale per la Prevenzione della Corruzione e della Trasparenza, con focus sui rischi specifici dei singoli processi.",
        "b": "Piano della Performance e nel Piano dei Fabbisogni del Personale, armonizzando gli obiettivi con le risorse umane disponibili.",
        "c": "Documento Tecnico di Accompagnamento al bilancio di previsione finanziario approvato dall'organo di indirizzo politico.",
        "d": "Bilancio Sociale dell'Ente e nella Relazione annuale sull'attività svolta dai nuclei di valutazione interna (OIV).",
        "correct": "b"
    },
    {
        "q": "Logica: 'Non è vero che se piove, allora non prendo l'ombrello'. Quale delle seguenti conclusioni è corretta?",
        "a": "Certamente piove e certamente ho preso l'ombrello.",
        "b": "Non piove affatto, ma ho comunque preso l'ombrello per precauzione.",
        "c": "Certamente piove, ma ho deciso di non prendere l'ombrello.",
        "d": "Se non piove, allora è impossibile che io abbia preso l'ombrello.",
        "correct": "a"
    },
    {
        "q": "Il principio di 'Fiducia' (Art. 2 D.Lgs. 36/2023) stabilisce che l'azione dei funzionari pubblici si presume legittima:",
        "a": "In via assoluta e insindacabile, al fine di evitare il fenomeno della cosiddetta 'burocrazia difensiva'.",
        "b": "Salvo i casi in cui sia accertato il dolo o la colpa grave, valorizzando l'autonomia decisionale e la discrezionalità amministrativa.",

        "correct": "b"
    },
    {
        "q": "In materia di rinvio pregiudiziale alla CGUE (Art. 267 TFUE), i giudici nazionali le cui sentenze non siano impugnabili:",
        "a": "Hanno la facoltà di sollevare la questione solo se vi è un contrasto interpretativo tra le parti costituite in giudizio.",
        "b": "Hanno l'obbligo di sollevare la questione, a meno che non si tratti di 'atto chiaro' o di questione già decisa dalla Corte.",
        "c": "Devono richiedere una preventiva autorizzazione motivata al Consiglio Superiore della Magistratura o al Ministero della Giustizia.",
        "d": "Possono sollevare la questione solo se la controversia riguarda materie rientranti nella competenza esclusiva dell'Unione.",
        "correct": "b"
    },
    {
        "q": "L'invalidità cosiddetta 'ad efficacia caducante' si manifesta quando l'annullamento dell'atto presupposto:",
        "a": "Travalica automaticamente e necessariamente sull'atto consequenziale in virtù di un nesso di stretta e diretta dipendenza.",

        "c": "Viene pronunciato dall'amministrazione in sede di riesame straordinario senza necessità di un nuovo interesse pubblico.",
        "d": "Riguarda esclusivamente vizi di forma o di procedura che non incidono sul contenuto dispositivo del provvedimento finale.",
        "correct": "a"
    },
    {
        "q": "Il 'subappalto a cascata' nel D.Lgs. 36/2023 è attualmente disciplinato come segue:",
        "a": "È vietato in modo categorico dal legislatore nazionale per prevenire infiltrazioni mafiose e garantire la sicurezza sul lavoro.",
        "b": "È generalmente consentito, fermo restando il potere della stazione appaltante di limitarlo o vietarlo con motivazione nella lex specialis.",
        "c": "È ammesso senza limiti solo per gli appalti di servizi intellettuali e forniture di importo inferiore alla soglia comunitaria.",
        "d": "Richiede una specifica e preventiva autorizzazione da parte dell'Ispettorato del Lavoro e del Prefetto territorialmente competente.",
        "correct": "b"
    },
    {
        "q": "Ai sensi dell'art. 2, c. 9 della L. 241/90, la mancata emanazione del provvedimento nei termini prefissati:",
        "a": "Configura un'ipotesi di reato di omissione di atti d'ufficio che deve essere segnalata immediatamente alla Procura della Repubblica.",

        "correct": "b"
    },
    {
        "q": "Nella logica deduttiva, qual è la negazione corretta della proposizione 'Tutti i gatti sono neri'?",
        "a": "Nessun gatto è di colore nero.",
        "b": "Tutti i gatti sono di colore bianco.",
        "c": "Esiste almeno un gatto che non è nero.",
        "d": "Alcuni gatti sono di colore nero.",
        "correct": "c"
    },
    {
        "q": "Il conferimento di incarichi dirigenziali a soggetti esterni alla P.A. (Art. 19, c. 6 D.Lgs. 165/2001) è ammesso:",
        "a": "Senza alcun limite numerico, purché i candidati siano in possesso di comprovata esperienza professionale almeno quinquennale.",
        "b": "Entro limiti percentuali della dotazione organica e per funzioni che richiedano una particolare e comprovata specializzazione professionale.",
        "c": "Esclusivamente nel caso in cui l'amministrazione si trovi in stato di dissesto finanziario o sotto gestione commissariale prefettizia.",
        "d": "Per una durata massima di 12 mesi non prorogabili, previa pubblicazione di un avviso di selezione sul Portale del Reclutamento InPA.",
        "correct": "b"

];

        let quizSessione = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timerInterval;
        let secondsElapsed = 0;

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const optionsGrid = document.getElementById('options-grid');
        const nextBtn = document.getElementById('next-btn');
        const feedbackBox = document.getElementById('feedback-box');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const progressFill = document.getElementById('progress-fill');
        const questionCounter = document.getElementById('question-counter');
        const timeDisplay = document.getElementById('time-display');

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            quizSessione = shuffle([...databaseQuiz]).slice(0, 13);
            score = 0; currentQuestionIndex = 0; secondsElapsed = 0;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const mins = String(Math.floor(secondsElapsed/60)).padStart(2,'0');
                const secs = String(secondsElapsed%60).padStart(2,'0');
                timeDisplay.innerText = `${mins}:${secs}`;
            }, 1000);
            loadQuestion();
        }

        function loadQuestion() {
            nextBtn.style.display = 'none';
            feedbackBox.className = 'feedback-box';
            optionsGrid.innerHTML = '';
            const q = quizSessione[currentQuestionIndex];
            questionText.innerText = q.q;
            questionCounter.innerText = `Domanda ${currentQuestionIndex + 1}/13`;
            progressFill.style.width = `${(currentQuestionIndex/13)*100}%`;
            
            shuffle([...q.o]).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const all = optionsGrid.querySelectorAll('.option-btn');
                    all.forEach(b => {
                        b.disabled = true;
                        if(b.innerText === q.a) {
                            b.classList.add('correct'); 
                        }
                    });
                    
                    feedbackBox.style.padding = "1.2rem";
                    feedbackBox.style.borderRadius = "8px";
                    feedbackBox.style.marginTop = "1.2rem";
                    
                    if(opt === q.a) { 
                        score++; 
                        feedbackTitle.innerText="✅ ESATTO"; 
                        feedbackTitle.style.color = "#065F46";
                        feedbackBox.style.backgroundColor = '#D1FAE5'; 
                        feedbackBox.style.border = '2px solid #10B981';
                        feedbackText.innerHTML = "<strong>Riferimento normativo:</strong> " + q.e;
                    }
                    else { 
                        btn.classList.add('wrong'); 
                        feedbackTitle.innerText="❌ ERRORE GRAVE"; 
                        feedbackTitle.style.color = "#991B1B";
                        feedbackBox.style.backgroundColor = '#FEE2E2'; 
                        feedbackBox.style.border = '2px solid #EF4444';
                        feedbackText.innerHTML = "<strong style='color: #991B1B;'>La risposta corretta era:</strong> <span style='color: #065F46; font-weight: 800;'>" + q.a + "</span><br><br><strong style='color: #991B1B;'>Perché hai sbagliato:</strong> " + q.e + " <br><br><em style='color: #666; font-size: 0.85rem;'>⚠️ Hai risposto d'impulso cadendo in un classico trabocchetto. Al concorso un errore così banale ti costa l'idoneità.</em>";
                    }
                    
                    feedbackBox.classList.add('show');
                    nextBtn.style.display = 'block';
                };
                optionsGrid.appendChild(btn);
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if(currentQuestionIndex < 13) loadQuestion();
            else {
                clearInterval(timerInterval);
                quizScreen.classList.add('hidden');
                resultScreen.classList.remove('hidden');
                const perc = Math.round((score/13)*100);
                document.getElementById('score-display').innerText = perc + "%";
                document.getElementById('final-time').innerText = timeDisplay.innerText;
                const sc = document.getElementById('sales-container');
                if(perc < 80) {
                    document.getElementById('score-display').style.background = "var(--action-red)";
                    sc.innerHTML = `<div class="sales-pitch"><h3>⚠️ FALLITO: Preparazione insufficiente</h3><p>Con questo punteggio verresti scartato immediatamente. Le lacune in Diritto Amministrativo sono letali nei concorsi 2026.</p><p style="margin-top:1rem; font-weight:800;">SALVA IL TUO CONCORSO CON IL MANUALE D'ASSALTO (69 PAGINE):</p><a href="https://toscano334.gumroad.com/l/nhrfnx" class="btn-primary">SCARICA IL MANUALE SALVA-CONCORSO (15€) ➔</a></div>`;
