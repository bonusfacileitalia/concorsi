<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7345740458390832" crossorigin="anonymous"></script>
    <style>
        :root { --primary-blue: #0A2540; --action-red: #D93025; --bg-light: #F6F9FC; --text-dark: #333333; --success: #10B981; --error: #EF4444; --card-bg: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--primary-blue); color: white; padding: 1.5rem 1rem; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { font-size: 1.8rem; font-weight: 800; }
        .quiz-container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; flex-grow: 1; width: 100%; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-weight: 600; }
        .timer { display: flex; align-items: center; gap: 0.5rem; background: #E2E8F0; padding: 0.5rem 1rem; border-radius: 20px; font-variant-numeric: tabular-nums; }
        .progress-bar { width: 100%; height: 10px; background: #E2E8F0; border-radius: 5px; margin-bottom: 2rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-blue); width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 1.3rem; font-weight: 800; margin-bottom: 1.5rem; line-height: 1.4; }
        .options-grid { display: grid; gap: 0.8rem; }
        .option-btn { background: var(--bg-light); border: 2px solid #E2E8F0; padding: 0.8rem 1rem; border-radius: 8px; font-size: 1rem; text-align: left; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .option-btn:hover:not(:disabled) { border-color: var(--primary-blue); background: #E2E8F0; }
        .option-btn.correct { background-color: #D1FAE5 !important; border-color: var(--success) !important; color: #065F46 !important; }
        .option-btn.wrong { background-color: #FEE2E2 !important; border-color: var(--error) !important; color: #991B1B !important; }
        .feedback-box { margin-top: 1.2rem; padding: 1.2rem; border-radius: 8px; border: 2px solid transparent; display: none; }
        .feedback-box.show { display: block; animation: slideDown 0.3s ease; }
        .btn-primary { background: var(--action-red); color: white; border: none; padding: 1rem; font-size: 1.2rem; font-weight: 800; border-radius: 8px; cursor: pointer; display: block; width: 100%; text-align: center; text-decoration: none; margin-top: 1.5rem; }
        .score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 800; margin: 0 auto 1.5rem; }
        .sales-pitch { background: #FFF4F2; border: 2px solid var(--action-red); padding: 1.5rem; border-radius: 12px; margin: 1.5rem 0; text-align: left; line-height: 1.5; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header><h1>Simulatore Esame 2026</h1></header>
    <main class="quiz-container">
        <div id="start-screen" class="card" style="text-align: center;">
            <h2 style="margin-bottom: 1rem;">Protocollo di Selezione</h2>
            <p style="margin-bottom: 2rem; color: #666;">Questo non è un gioco. Solo il 5% dei candidati supera questa soglia di sbarramento psicologico. Sei pronto a guardare in faccia la realtà?</p>
            <button class="btn-primary" onclick="startQuiz()">MISURA IL TUO POTENZIALE ➔</button>
        </div>
        <div id="quiz-screen" class="card hidden">
            <div class="quiz-header"><span id="question-counter">Domanda 1/13</span><div class="timer">⏱️ <span id="time-display">00:00</span></div></div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
            <h2 id="question-text" class="question-text"></h2>
            <div id="options-grid" class="options-grid"></div>
            <div id="feedback-box" class="feedback-box">
                <h4 id="feedback-title" style="margin-bottom: 0.5rem; font-weight: 800;"></h4>
                <div id="feedback-content"></div>
            </div>
            <button id="next-btn" class="btn-primary" style="display:none; background: var(--primary-blue);" onclick="nextQuestion()">CONTINUA IL TEST ➔</button>
        </div>
        <div id="result-screen" class="card hidden" style="text-align: center;">
            <h2>Verdetto Strategico</h2>
            <div class="score-circle" id="score-display">0%</div>
            <div id="sales-container"></div>
            <button class="btn-primary" style="background-color: var(--primary-blue); margin-top: 1rem;" onclick="location.reload()">🔄 TENTA NUOVAMENTE</button>
        </div>
    </main>

        let quizSessione = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timerInterval;
        let secondsElapsed = 0;

        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            quizSessione = shuffle([...databaseQuiz]).slice(0, 13);
            score = 0; currentQuestionIndex = 0; secondsElapsed = 0;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const mins = String(Math.floor(secondsElapsed/60)).padStart(2,'0');
                const secs = String(secondsElapsed%60).padStart(2,'0');
                document.getElementById('time-display').innerText = mins + ":" + secs;
            }, 1000);
            loadQuestion();
        }

        function loadQuestion() {
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('feedback-box').className = 'feedback-box';
            document.getElementById('options-grid').innerHTML = '';
            const q = quizSessione[currentQuestionIndex];
            const correctText = q.options[q.a];
            
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = "Domanda " + (currentQuestionIndex + 1) + "/13";
            document.getElementById('progress-fill').style.width = ((currentQuestionIndex)/13)*100 + "%";
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    const all = document.querySelectorAll('.option-btn');
                    all.forEach(b => {
                        b.disabled = true;
                        if(b.innerText === correctText) b.classList.add('correct');
                    });
                    
                    const fb = document.getElementById('feedback-box');
                    const ft = document.getElementById('feedback-title');
                    const fc = document.getElementById('feedback-content');
                    
                    if(opt === correctText) { 
                        score++; 
                        ft.innerText="✅ ANALISI CORRETTA"; 
                        ft.style.color = "#065F46";
                        fb.style.backgroundColor = '#D1FAE5'; 
                        fb.style.border = '2px solid #10B981';
                        fc.innerHTML = "<p style='color: #065F46;'>Hai dimostrato lucidità. Questa è la mentalità che serve per vincere.</p>";
                    } else { 
                        btn.classList.add('wrong'); 
                        ft.innerText="❌ ERRORE LETALE"; 
                        ft.style.color = "#D93025";
                        fb.style.backgroundColor = '#FEE2E2'; 
                        fb.style.border = '2px solid #EF4444';
                        fc.innerHTML = `
                            <p style="color: #991B1B; margin-bottom: 0.5rem;"><b>La risposta corretta era:</b> <span style="font-weight: 800;">${correctText}</span></p>
                            <p style="color: #991B1B; margin-bottom: 0.8rem;"><b>Perché hai sbagliato:</b> ${q.e}</p>
                            <p style="color: #666; font-size: 0.85rem; font-style: italic; border-top: 1px solid #F87171; padding-top: 0.5rem;">⚠️ Al concorso reale, questo errore ti avrebbe appena fatto perdere molte posizioni in graduatoria.</p>
                        `;
                    }
                    fb.classList.add('show');
                    document.getElementById('next-btn').style.display = 'block';
                };
                document.getElementById('options-grid').appendChild(btn);
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if(currentQuestionIndex < 13) loadQuestion();
            else {
                clearInterval(timerInterval);
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                const perc = Math.round((score/13)*100);
                document.getElementById('score-display').innerText = perc + "%";
                const sc = document.getElementById('sales-container');
                if(perc < 80) {
                    document.getElementById('score-display').style.background = "var(--action-red)";
                    sc.innerHTML = `
                        <div class="sales-pitch">
