<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Concorsi 2026 - Versione Camouflage</title>
    <style>
        :root { --primary: #1a252f; --accent: #2980b9; --success: #27ae60; --danger: #c0392b; --bg: #050505; --card: #111; --text: #e0e0e0; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }
        #home-page { display: none; text-align: center; background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid #222; max-width: 600px; width: 90%; }
        h1 { color: #fff; font-size: 2.2em; text-transform: uppercase; font-weight: 800; margin-bottom: 10px; }
        .stat-val { font-size: 2.2em; font-weight: 900; color: var(--accent); }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .btn-start { background: linear-gradient(135deg, #2980b9, #2c3e50); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; width: 100%; }
        .btn-exam { background: linear-gradient(135deg, #c0392b, #8e44ad); }
        #quiz-container { display: none; background: var(--card); padding: 40px; border-radius: 16px; max-width: 850px; width: 95%; border: 1px solid #222; }
        .timer { font-family: monospace; font-size: 1.6em; color: #fff; background: #1a1a1a; padding: 5px 15px; border-radius: 6px; border: 1px solid #333; }
        .materia-tag { color: var(--accent); font-size: 0.75em; text-transform: uppercase; font-weight: 800; margin-bottom: 15px; display: inline-block; padding: 4px 10px; background: rgba(41, 128, 185, 0.1); border-radius: 4px; }
        .question { font-size: 1.25em; margin-bottom: 30px; line-height: 1.6; color: #fff; }
        .option { padding: 18px 20px; background: #161616; border: 1px solid #333; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-size: 0.95em; color: #bbb; }
        .option:hover { background: #1c1c1c; border-color: #555; }
        .option.correct { background: rgba(39, 174, 96, 0.1) !important; border-color: var(--success) !important; color: #fff !important; }
        .option.wrong { background: rgba(192, 57, 43, 0.1) !important; border-color: var(--danger) !important; color: #fff !important; }
        .explanation { margin-top: 20px; padding: 20px; background: #111; border-left: 4px solid var(--accent); display: none; color: #aaa; font-size: 0.9em; }
        .btn-next { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 700; display: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="home-page">
    <h1>Centrale Concorsi</h1>
    <p>Simulatore RIPAM 2026 - Algoritmo Anti-Intuizione</p>
    <div class="stat-val" id="db-total">50</div>
    <div class="mode-grid">
        <button class="btn-start" onclick="preparaSessione(25, 25, false)">Test Sprint</button>
        <button class="btn-start btn-exam" onclick="preparaSessione(50, 50, true)">Esame Full</button>
    </div>
</div>

<div id="quiz-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <span id="current-q-idx">1</span>/<span id="total-q-count">50</span>
        <div class="timer" id="timer">00:00</div>
    </div>
    <span id="materia-label" class="materia-tag"></span>
    <div class="question" id="question-text"></div>
    <div id="options-container"></div>
    <div class="explanation" id="explanation-box"></div>
    <button class="btn-next" id="next-btn" onclick="prossimaDomanda()">Conferma</button>
</div>

<script>
const databaseQuiz = [
    // --- AMMINISTRATIVO (Opzioni Bilanciate) ---

        "options": [
            "Perde definitivamente ogni potere di intervento sulla legittimità dell'attività segnalata dal privato.",
            "Può intervenire solo se ricorrono i presupposti per l'annullamento d'ufficio ex art. 21-nonies.",

            "Deve obbligatoriamente avviare un nuovo procedimento di autorizzazione espresso per legge."
        ],
        "a": 1,
        "e": "Dopo i 60 giorni, la SCIA si stabilizza: l'amministrazione può agire solo con i poteri di autotutela (12 mesi + interesse pubblico).",
        "materia": "Diritto Amministrativo"
    },
    {
        "q": "L'accesso civico generalizzato (FOIA) può essere rifiutato per tutelare gli interessi commerciali di un'impresa privata se:",
        "options": [
            "L'impresa ha presentato una generica opposizione scritta entro i termini previsti dalla legge.",
            "L'ostensione dei dati determina un pregiudizio concreto e provato alla competitività dell'azienda.",
            "L'amministrazione ritiene che il diritto alla riservatezza prevalga sempre sulla trasparenza totale.",
            "I documenti richiesti contengono esclusivamente dati anagrafici dei soci e degli amministratori."
        ],

        "options": [

        ],
        "a": 2,
        "e": "Se l'atto è discrezionale, la forma è sostanza. Se è vincolato e il risultato è obbligato, il vizio formale non lo annulla.",
        "materia": "Diritto Amministrativo"
    },
    {
        "q": "Il diritto di accesso ai documenti amministrativi (L. 241/90) è riconosciuto a chiunque abbia un interesse:",
        "options": [

            "Diretto, concreto e attuale, corrispondente ad una situazione giuridicamente tutelata.",
            "Esclusivamente legato alla propria posizione di cittadino residente nel comune interessato.",
            "Politico o sindacale volto a verificare l'efficienza complessiva degli uffici pubblici."
        ],
        "a": 1,
        "e": "L'accesso 241/90 non è per tutti: devi dimostrare che quel documento ti serve per difendere un tuo diritto specifico.",
        "materia": "Diritto Amministrativo"
    },
    // --- APPALTI (Opzioni Bilanciate) ---
    {
        "q": "Secondo il Principio del Risultato (Art. 1 D.Lgs 36/2023), l'affidamento del contratto deve garantire:",
        "options": [

        ],
        "a": 1,
        "e": "Il 'Risultato' è il nuovo faro: l'opera deve essere fatta bene e in fretta. La concorrenza è lo strumento, non il fine.",
        "materia": "Codice Appalti"
    },
    {
        "q": "Il soccorso istruttorio è attivabile dalla stazione appaltante per sanare quale delle seguenti fattispecie?",
        "options": [

            "La mancanza di elementi essenziali relativi alle caratteristiche tecniche del prodotto offerto.",
            "La carenza di documenti amministrativi non riguardanti l'offerta tecnica o quella economica.",
            "L'invio dell'offerta oltre il termine perentorio fissato dal bando di gara per la ricezione."
        ],
        "a": 2,

        "q": "L'istituto dell'avvalimento consente ad un operatore economico di partecipare ad una gara:",
        "options": [

            "Subappaltando l'intera esecuzione dell'appalto ad un'impresa terza senza autorizzazione.",
            "Costituendo obbligatoriamente un Raggruppamento Temporaneo di Imprese con un socio paritario.",
            "Delegando la firma del contratto e la responsabilità dell'opera ad un consulente esterno."
        ],
        "a": 0,
        "e": "Con l'avvalimento 'prendi in prestito' i requisiti che non hai (es. fatturato) da un'impresa ausiliaria.",
        "materia": "Codice Appalti"
    },
    {
        "q": "La garanzia provvisoria versata dai concorrenti in sede di offerta ha la funzione di:",
        "options": [
            "Coprire eventuali danni causati dal contraente durante la fase di esecuzione del contratto.",
            "Garantire la serietà dell'offerta e la sottoscrizione del contratto in caso di aggiudicazione.",
            "Anticipare il pagamento dei corrispettivi spettanti ai subappaltatori dell'impresa vincitrice.",
            "Assicurare il pagamento delle penali in caso di ritardo nella consegna dei lavori ultimati."
        ],
        "a": 1,
        "e": "La provvisoria serve a 'bloccare' l'impresa: se vinci e scappi, la PA incassa la garanzia.",
        "materia": "Codice Appalti"
    },
    // ... (Aggiungere altre 40 domande qui con lo stesso stile di bilanciamento) ...
    {
        "q": "Nel sillogismo: 'Tutti gli impiegati pubblici sono ligi. Alcuni atleti sono impiegati pubblici'. Cosa ne consegue?",
        "options": [
            "Tutti gli atleti sono necessariamente ligi al proprio dovere.",
            "Alcuni atleti sono ligi al proprio dovere in quanto impiegati.",
            "Nessun atleta può essere considerato ligi al proprio dovere.",
            "Tutti i ligi sono atleti che lavorano nella pubblica amministrazione."
        ],
        "a": 1,
        "e": "Logica deduttiva: se un gruppo (atleti) si interseca con un altro (impiegati), le proprietà del secondo passano all'intersezione.",
        "materia": "Logica"
    }
];

// Funzioni base (Sostituisci con le tue funzioni di gestione sessione del messaggio precedente)
const STORAGE_KEY = 'concorso_v3';
const SESSION_KEY = 'session_v3';
let sessionPool = [];
let sessionIdx = 0;
let sessionAnswers = [];
let timeLeft = 0;
let timerInterval;

function preparaSessione(num, min, exam) {
    sessionPool = databaseQuiz.map((_, i) => i).sort(() => Math.random() - 0.5).slice(0, num);
    sessionIdx = 0;
    sessionAnswers = [];
    timeLeft = min * 60;
    document.getElementById('home-page').style.display = 'none';
    document.getElementById('quiz-container').style.display = 'block';
    startTimer();
    caricaDomanda();
}

function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if(timeLeft <= 0) { clearInterval(timerInterval); alert('Tempo Scaduto!'); location.reload(); }
    }, 1000);
}

function caricaDomanda() {
    let q = databaseQuiz[sessionPool[sessionIdx]];
    document.getElementById('materia-label').innerText = q.materia;
    document.getElementById('question-text').innerText = q.q;
    let cont = document.getElementById('options-container');
    cont.innerHTML = '';
    q.options.forEach((opt, i) => {
        let div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => {
            document.querySelectorAll('.option').forEach(o => o.onclick = null);
            if(i === q.a) div.classList.add('correct');
            else { div.classList.add('wrong'); cont.children[q.a].classList.add('correct'); }
            document.getElementById('explanation-box').innerText = q.e;
            document.getElementById('explanation-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        };
        cont.appendChild(div);
    });
}

function prossimaDomanda() {
    sessionIdx++;
    if(sessionIdx < sessionPool.length) {
        document.getElementById('explanation-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        caricaDomanda();
    } else {
        alert('Test concluso!');
        location.reload();
    }
}
</script>
</body>
</html>
